<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-Reputation Watcher</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <h1 id="clientName">Client non configure</h1>
        <p class="status-line">
          <span id="statusDot" class="status-dot status-active"></span>
          <span id="statusText">Actif</span>
        </p>
      </header>

      <nav class="tabs" aria-label="Popup tabs">
        <button class="tab-button active" data-tab="alerts" type="button">Alertes</button>
        <button class="tab-button" data-tab="config" type="button">Config</button>
        <button class="tab-button" data-tab="stats" type="button">Stats</button>
      </nav>

      <section id="tab-alerts" class="tab-panel active">
        <div class="alerts-toolbar">
          <div class="filters" role="group" aria-label="Sentiment filters">
            <button class="filter-button active" data-filter="all" type="button">Tous</button>
            <button class="filter-button" data-filter="very_negative" type="button">Tres neg.</button>
            <button class="filter-button" data-filter="negative" type="button">Negatif</button>
            <button class="filter-button" data-filter="neutral" type="button">Neutre</button>
          </div>
          <button id="clearAlertsBtn" class="clear-btn" type="button" title="Effacer toutes les alertes">Effacer</button>
        </div>

        <div class="alerts-list-wrap">
          <div id="alertsList" class="alerts-list"></div>
          <div id="emptyState" class="empty-state hidden">
            <span class="empty-state-icon">◎</span>
            <span>Aucune alerte — surveillance active</span>
          </div>
          <button id="scrollTopBtn" class="scroll-top-btn" type="button" title="Revenir en haut">↑</button>
        </div>
      </section>

      <section id="tab-config" class="tab-panel">
        <form id="configForm" class="config-form">
          <label>
            Client name
            <input id="clientNameInput" name="client_name" type="text" placeholder="Banque XYZ" />
          </label>

          <label>
            Keywords (one per line)
            <textarea id="keywordsInput" name="keywords" rows="5" placeholder="banque xyz&#10;xyz bank&#10;carte xyz"></textarea>
          </label>

          <label>
            Alert email
            <input id="alertEmailInput" name="alert_email" type="email" placeholder="client@banque.tn" />
          </label>

          <label class="switch-row">
            <span>Auto scan</span>
            <input id="autoScanInput" name="auto_scan" type="checkbox" checked />
          </label>

          <label>
            Groq API key
            <input id="groqKeyInput" name="groq_api_key" type="password" placeholder="gsk_..." />
          </label>

          <label>
            Gemini API key
            <input id="geminiKeyInput" name="gemini_api_key" type="password" placeholder="AIza..." />
          </label>

          <label>
            Backend URL
            <input
              id="backendUrlInput"
              name="backend_url"
              type="url"
              value="https://e-reputation-backend.onrender.com"
              placeholder="https://your-backend.onrender.com"
            />
          </label>

          <button id="saveConfigButton" class="primary-button" type="submit">Save</button>
        </form>
      </section>

      <section id="tab-stats" class="tab-panel">
        <div class="stats-content">
          <div class="stats-grid">
            <article class="stat-card">
              <p class="stat-label">Posts analyzes today</p>
              <p id="totalToday" class="stat-value">0</p>
            </article>

            <article class="stat-card">
              <p class="stat-label">Tres negatif</p>
              <p id="countVeryNegative" class="stat-value tone-very-negative">0</p>
              <div class="mini-bar"><span id="barVeryNegative"></span></div>
            </article>

            <article class="stat-card">
              <p class="stat-label">Negatif</p>
              <p id="countNegative" class="stat-value tone-negative">0</p>
              <div class="mini-bar"><span id="barNegative"></span></div>
            </article>

            <article class="stat-card">
              <p class="stat-label">Neutre</p>
              <p id="countNeutral" class="stat-value tone-neutral">0</p>
              <div class="mini-bar"><span id="barNeutral"></span></div>
            </article>

            <article class="stat-card">
              <p class="stat-label">Positif</p>
              <p id="countPositive" class="stat-value tone-positive">0</p>
              <div class="mini-bar"><span id="barPositive"></span></div>
            </article>
          </div>

          <p class="last-scan">
            Last scan: <span id="lastScanText">Never</span>
          </p>

          <button id="manualScanButton" class="primary-button" type="button">Scanner maintenant</button>

          <div class="auto-scroll-block">
            <p class="auto-scroll-status">
              Auto-scroll: <span id="autoScrollStatusText">Inactif</span>
            </p>
            <div class="auto-scroll-actions">
              <button id="autoScrollStartButton" class="secondary-button" type="button">Start auto-scroll</button>
              <button id="autoScrollStopButton" class="secondary-button" type="button">Stop auto-scroll</button>
            </div>
          </div>

          <div class="groups-block">
            <div class="groups-head">
              <p class="groups-title">Groupes pertinents surveilles</p>
              <span id="relevantGroupsCount" class="groups-count">0</span>
            </div>
            <div id="relevantGroupsList" class="groups-list"></div>
            <p id="relevantGroupsEmpty" class="groups-empty hidden">Aucun groupe pertinent disponible.</p>
          </div>
        </div>
      </section>

      <footer class="footer-status">
        <span id="feedbackText"></span>
      </footer>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
